name: quality

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pqc_chat_test
          POSTGRES_USER: pqc_chat
          POSTGRES_PASSWORD: pqc_chat
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U pqc_chat -d pqc_chat_test"
          --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Backend tests (PostgreSQL)
        env:
          DB_BACKEND: postgres
          POSTGRES_DB: pqc_chat_test
          POSTGRES_USER: pqc_chat
          POSTGRES_PASSWORD: pqc_chat
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          SQLITE_PATH: ""
        run: python backend/manage.py test users chat --verbosity 1

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
